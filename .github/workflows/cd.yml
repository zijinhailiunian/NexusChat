name: CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Quality gate before release
        run: npm run check

      - name: Build artifact
        run: npm pack

      - name: Post-release health check validation
        run: bash scripts/health-check.sh

      - name: Post-release alert check
        run: bash scripts/alert-check.sh /tmp/nexuschat-health-check.log

      - name: Rollback plan verification
        run: bash scripts/rollback-verify.sh
