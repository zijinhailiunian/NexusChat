name: CI

on:
  pull_request:
  push:
    branches:
      - work

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Static check
        run: npm run lint

      - name: Test execution
        run: npm run test:all

      - name: Build artifact
        run: npm pack

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexuschat-package
          path: "*.tgz"
